version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saaha_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saaha_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change_this_secret_in_production
      DELIVERY_FEE: 40
      COMMISSION_RATE: 0.10
    depends_on:
      - postgres

  frontend:
    build: ./frontend-web
    ports:
      - "5173:5173"
    depends_on:
      - backend

  admin-panel:
    build: ./admin-panel
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  pgdata:
